<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2PM HOTTEST</title>
  <!-- Google Fonts: Cinzel, Cormorant Garamond, Pinyon Script, Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Pinyon+Script&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #070709; /* 極致深邃黑 */
      --text-light: #ffffff;
      --text-silver: #cbd5e1;
      --border-silver: rgba(255, 255, 255, 0.08);
      --silver-gradient: linear-gradient(135deg, #ffffff 0%, #cbd5e1 50%, #8a939e 100%);
      --font-display: 'Cinzel', serif;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-signature: 'Pinyon Script', cursive;
      --font-sans: 'Montserrat', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-silver);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* 珍珠黑海報紙質紋理 */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      opacity: 0.035;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* 背景柔和銀白聚光燈 */
    .spotlight {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      flex-grow: 1;
      justify-content: center;
    }

    /* 頂部海報角落資訊 */
    .header-layout {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 50px;
      animation: fadeInDown 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .header-left {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-light);
      line-height: 1.4;
      letter-spacing: 0.25em;
      opacity: 0.85;
      text-align: left;
    }

    .header-right {
      font-family: var(--font-signature);
      font-size: 2rem;
      color: var(--text-light);
      transform: rotate(-10deg);
      opacity: 0.85;
      letter-spacing: -1px;
    }

    /* 仿 JYP 藝術畫框的相片容器 */
    .photo-frame-wrapper {
      position: relative;
      padding: 14px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid var(--border-silver);
      border-radius: 4px;
      box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
      margin-bottom: 45px;
      transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      animation: zoomIn 1.5s cubic-bezier(0.25, 1, 0.5, 1);
      max-width: 600px;
      width: 100%;
    }

    .photo-frame-wrapper:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 255, 255, 0.05);
    }

    .photo-frame-inner {
      width: 100%;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.6);
      background: #000;
      /* Crop bottom ~12% to hide 'in TOKYO DOME' text */
      aspect-ratio: 16 / 8.2;
    }

    .photo-frame-inner img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
      transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .photo-frame-wrapper:hover .photo-frame-inner img {
      transform: scale(1.03);
    }

    /* 2PM HOTTEST 質感文字標題區 */
    .title-section {
      text-align: center;
      animation: fadeInUp 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .hottest-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-main {
      display: flex;
      align-items: baseline;
      gap: 15px;
    }

    .brand-2pm {
      font-family: var(--font-display);
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--text-light);
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .brand-hottest {
      font-family: var(--font-signature);
      font-size: 7.2rem;
      font-weight: 400;
      background: var(--silver-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 0.8;
      letter-spacing: -2px;
      transform: translateY(10px);
    }

    .brand-sub {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-style: italic;
      color: var(--text-light);
      letter-spacing: 0.25em;
      margin-top: 15px;
      opacity: 0.8;
      text-transform: uppercase;
    }

    /* 頁尾 JYP 商標聲明 */
    .footer-section {
      width: 100%;
      text-align: center;
      padding-top: 40px;
      z-index: 10;
      animation: fadeIn 2s ease;
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: var(--text-light);
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .footer-logo span {
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

    .footer-note {
      font-size: 0.65rem;
      color: #4b5563;
      letter-spacing: 0.05em;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 響應式排版優化 */
    @media (max-width: 768px) {
      body {
        padding: 30px 15px;
      }

      .header-layout {
        margin-bottom: 30px;
      }

      .brand-2pm {
        font-size: 1.8rem;
      }

      .brand-hottest {
        font-size: 4.8rem;
      }

      .brand-sub {
        font-size: 0.9rem;
        letter-spacing: 0.15em;
      }

      .photo-frame-wrapper {
        padding: 8px;
        margin-bottom: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Spotlight -->
  <div class="spotlight"></div>

  <!-- Main Container -->
  <div class="container">
    
    <!-- Top Left & Right Header -->
    <div class="header-layout">
      <div class="header-left">2PM<br>OFFICIAL<br>FANCLUB</div>
      <div class="header-right">hottest</div>
    </div>

    <!-- Center Photo Frame containing the 2PM image -->
    <div class="photo-frame-wrapper">
      <div class="photo-frame-inner">
        <img src="main.jpg" alt="2PM 15th Anniversary Concert THE RETURN">
      </div>
    </div>

    <!-- Bottom Brand Title -->
    <div class="title-section">
      <div class="hottest-brand">
        <div class="brand-main">
          <span class="brand-2pm">2PM</span>
          <span class="brand-hottest">Hottest</span>
        </div>
        <div class="brand-sub">15th Anniversary Concert — THE RETURN</div>
      </div>
    </div>

  </div>

  <!-- JYP Brand Footer -->
  <div class="footer-section">
    <div class="footer-logo">JYP <span>LEADER IN ENTERTAINMENT</span></div>
    <div class="footer-note">© JYP ENTERTAINMENT Co., Ltd. All Rights Reserved.</div>
  </div>

</body>
</html>
